# ─── Audio ───────────────────────────────────────────────────────────────────
audio:
  sample_rate: 44100
  channels: 1               # start mono, switch to 2 for stereo
  chunk_seconds: 2.5        # training window length
  hop_seconds: 1.0          # overlap-add hop for inference

# ─── Degradations ────────────────────────────────────────────────────────────
degradations:
  mp3_bitrates: [64, 96, 128, 192]
  aac_bitrates: [64, 96, 128]
  opus_bitrates: [48, 64, 96]
  resample_rates: [16000, 22050]   # downsample then back to sample_rate
  prob_lowpass: 0.3                # apply lowpass before codec
  lowpass_cutoff_hz: 8000
  prob_stereo_collapse: 0.2
  prob_clipping: 0.1
  clipping_threshold: 0.9

# ─── Model ───────────────────────────────────────────────────────────────────
model:
  name: WaveformUNet
  in_channels: 1
  base_channels: 32
  depth: 5                  # encoder/decoder levels
  kernel_size: 15
  use_ema: true
  ema_decay: 0.999

# ─── Loss ────────────────────────────────────────────────────────────────────
loss:
  lambda_l1: 0.3
  lambda_mr_stft: 0.5
  lambda_mel: 0.2
  lambda_highband: 0.1
  highband_cutoff_hz: 8000
  mr_stft_fft_sizes: [512, 1024, 2048]
  mr_stft_hop_sizes: [128, 256, 512]
  mr_stft_win_sizes: [512, 1024, 2048]
  mel_n_mels: 80

# ─── Training ────────────────────────────────────────────────────────────────
training:
  epochs: 100
  batch_size: 16
  learning_rate: 3.0e-4
  lr_scheduler: cosine
  warmup_epochs: 5
  grad_clip: 1.0
  mixed_precision: true
  num_workers: 4
  val_every_n_epochs: 5
  save_every_n_epochs: 10
  log_dir: runs/
  checkpoint_dir: checkpoints/

# ─── Data ────────────────────────────────────────────────────────────────────
data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_split: 0.9
  seed: 42
